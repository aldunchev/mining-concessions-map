<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Concessions Map - Bulgaria</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .password-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .password-container h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.8em;
            font-weight: 300;
        }
        .password-container p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .password-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .password-input:focus {
            outline: none;
            border-color: #3498db;
        }
        .password-button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .password-button:hover {
            background: #2980b9;
        }
        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="password-container" id="password-form">
        <h1>🗺️ Mining Concessions Map</h1>
        <p>Enter password to access the interactive map of mining concessions in Bulgaria.</p>
        <input type="password" class="password-input" id="password-input" placeholder="Password" />
        <button class="password-button" onclick="checkPassword()">DECRYPT</button>
        <div class="error-message" id="error-message"></div>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById('password-input').value;
            const correctPassword = 'ConcessionsBG2024';
            
            if (password === correctPassword) {
                document.getElementById('password-form').style.display = 'none';
                // Redirect to the actual map page
                window.location.href = 'map.html';
            } else {
                document.getElementById('error-message').textContent = 'Bad password!';
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
